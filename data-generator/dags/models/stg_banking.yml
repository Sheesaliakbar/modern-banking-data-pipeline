version: 2

models:
  - name: stg_accounts
    description: "Cleaned account data"
    columns:
      - name: account_id
        tests:
          - unique
          - not_null
      - name: balance
        tests:
          - not_null

  - name: stg_customers
    description: "Cleaned customer data"
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: email
        tests:
          - not_null